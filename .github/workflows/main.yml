name: AI Code Review

on:
  push:
    branches:
      - main
      - develop

jobs:
  code-review:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '🤖 AI Code Review:')"

    permissions:
      contents: write

    steps:
      # 拉代码
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # 安装Java
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '17'

      # Maven 构建
      - name: Build With Maven
        run: mvn clean install -DskipTests

      # 复制 JAR
      - name: Copy jar
        run: |
          mkdir -p libs
          cp target/*.jar ./libs/

      # 启动 Spring Boot 应用
      - name: Start Spring Boot Application
        run: |
          cd libs
          nohup java -jar ai-review-*.jar > app.log 2>&1 &
          echo $! > app.pid
          cd ..

      # 等待应用启动
      - name: Wait for Application to Start
        run: |
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/review/health > /dev/null; then
              echo "Application is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      # 配置 Git 用户信息
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      # 获取 Git Diff 并调用评审接口
      - name: Get Git Diff and Review Code
        id: review
        run: |
          echo "Getting Git diff..."

          # 获取 git diff（与上一个 commit 的差异）
          DIFF=$(git diff HEAD~1 HEAD)

          # 检查 diff 是否为空
          if [ -z "$DIFF" ]; then
            echo "No code changes detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          # 保存 diff 到文件
          echo "$DIFF" > diff.txt

          # 调用代码评审接口
          echo "Calling code review API..."
          RESPONSE=$(curl -s -X POST http://localhost:8080/api/review/code \
            -H "Content-Type: application/json" \
            -d "{
              \"diffContent\": $(jq -Rs . < diff.txt),
              \"model\": \"glm-4-flash\",
              \"repositoryName\": \"${{ github.repository }}\",
              \"branchName\": \"${{ github.ref_name }}\",
              \"commitId\": \"${{ github.sha }}\"
            }")

          # 保存响应
          echo "$RESPONSE" > review-result.json

          # 提取评审结果
          REVIEW_RESULT=$(echo "$RESPONSE" | jq -r '.reviewResult // "Review failed"')
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')

          echo "Review status: $STATUS"
          echo "Review result: $REVIEW_RESULT"

          # 保存到输出（用于后续步骤）
          {
            echo "review_status=$STATUS"
            echo "review_result<<EOF"
            echo "$REVIEW_RESULT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # 将评审结果写入到 commit（创建新 commit）
      - name: Commit Review Results
        if: steps.review.outputs.has_changes == 'true' && steps.review.outputs.review_status == 'success'
        run: |
          echo "Creating commit with review results..."

          # 创建评审结果文件
          cat > AI_REVIEW_RESULT.md << 'EOF'
          ## 🤖 AI Code Review Report

          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref_name }}
          **Original Commit:** ${{ github.sha }}
          **Status:** ${{ steps.review.outputs.review_status }}

          ---

          ### 📝 Review Results

          ${{ steps.review.outputs.review_result }}

          ---

          *Generated by AI Code Review Service*
          EOF

          # 添加文件到 Git
          git add AI_REVIEW_RESULT.md

          # 创建新的 commit（包含评审结果）
          # 使用 [skip ci] 防止触发循环
          git commit -m "🤖 AI Code Review: ${{ github.sha }}

          - Repository: ${{ github.repository }}
          - Branch: ${{ github.ref_name }}
          - Status: ${{ steps.review.outputs.review_status }}
          - Model: glm-4.7-flash

          [skip ci]"

          # 推送到远程
          git push origin HEAD:${{ github.ref_name }}

      # 将评审结果保存为 artifact
      - name: Upload Review Results
        if: steps.review.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: code-review-results-${{ github.sha }}
          path: |
            review-result.json
            diff.txt

      # 将评审结果输出到日志
      - name: Display Review Results
        if: steps.review.outputs.has_changes == 'true'
        run: |
          echo "=========================================="
          echo "AI Code Review Results"
          echo "=========================================="
          echo "${{ steps.review.outputs.review_result }}"
          echo "=========================================="

      # 停止应用
      - name: Stop Application
        if: always()
        run: |
          if [ -f libs/app.pid ]; then
            kill $(cat libs/app.pid) || true
            rm libs/app.pid
          fi
          pkill -f "ai-review-.*jar" || true
